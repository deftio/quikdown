  <link rel="stylesheet" href="{{ROOT}}/pages/styles/quikdown-site.css">
  <style>
    /* Full-viewport editor app:
       - body is locked to viewport height; nothing scrolls outside the editor panes
       - nav (sticky) and a tiny footer line take their natural heights
       - main fills the rest, the editor fills main, and only the editor's
         own source/preview panes scroll internally
       - this gives a single scrollbar inside the source pane and a single
         scrollbar inside the rendered pane, never an outer body scroll */
    body.edit-page-body {
      height: 100vh;
      max-height: 100vh;
      overflow: hidden;
    }
    body.edit-page-body main.qd-page-content {
      flex: 1 1 auto;
      min-height: 0;          /* let flex calculate; do NOT min-content the editor */
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
      padding-top: 0.75rem;
      padding-bottom: 0.75rem;
    }
    .edit-page-header {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      gap: 1rem;
      flex-wrap: wrap;
      flex-shrink: 0;
    }
    .edit-page-header h1 { font-size: 1.4rem; margin: 0; }
    .edit-page-header .subtitle {
      color: #4b5563;
      font-size: 0.9rem;
      margin: 0;
    }
    .edit-page-editor {
      flex: 1 1 auto;
      min-height: 0;          /* CRITICAL: lets the editor shrink in flex layout */
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.15);
      background: #ffffff;
      border: 1px solid #e6e8ee;
    }
    .edit-page-editor #editor { height: 100%; }
    .edit-page-bottom {
      flex-shrink: 0;
      text-align: center;
      font-size: 0.8rem;
      color: #6b7280;
      margin: 0;
    }
    /* Suppress the global footer on this page — it's a fullscreen app */
    body.edit-page-body .qd-footer { display: none; }
  </style>
</head>
<body class="qd-theme-light edit-page-body">
  {{NAV_HTML}}

  <main class="qd-page-content">
    <header class="edit-page-header">
      <div>
        <h1>Online Markdown Editor</h1>
        <p class="subtitle">Free, open source, runs in your browser. Powered by quikdown_edit.</p>
      </div>
    </header>

    <div class="edit-page-editor">
      <div id="editor"></div>
    </div>

    <p class="edit-page-bottom">
      Want this in your app? <a href="{{ROOT}}/pages/examples/editor-embed-minimal.html">Embed it in 5 lines</a> · <a href="{{ROOT}}/pages/examples/demo-headless.html">Run it headless with your own UI</a> · <a href="{{ROOT}}/pages/">Home</a>
    </p>
  </main>

  {{FOOTER_HTML}}

  <script type="module">
    import QuikdownEditor from '{{ROOT}}/dist/quikdown_edit.esm.js';

    // Detect page theme by reading the body class set in the HTML.
    // The shared site.js script may overwrite this on init from localStorage,
    // but at construction time the body class reflects whatever the page
    // was rendered with (default dark).
    function detectPageTheme() {
      const cls = document.body.classList;
      if (cls.contains('qd-theme-dark'))  return 'dark';
      if (cls.contains('qd-theme-light')) return 'light';
      if (cls.contains('qd-theme-auto'))  return 'auto';
      // Also check localStorage in case site.js already ran
      const stored = localStorage.getItem('quikdown-site-theme');
      if (stored === 'qd-theme-dark')  return 'dark';
      if (stored === 'qd-theme-light') return 'light';
      if (stored === 'qd-theme-auto')  return 'auto';
      return 'dark';
    }

    const editor = new QuikdownEditor('#editor', {
      mode: 'split',
      theme: detectPageTheme(),
      showRemoveHR: true,
      showLazyLinefeeds: true,
      showUndoRedo: true,
      // Preload every fence library so the demo content renders instantly
      // without per-fence lazy-load delays. This is the demo's choice — most
      // production apps should leave preloadFences off and only enable the
      // libraries they actually use, OR leave it lazy.
      preloadFences: 'all'
    });
    window.editor = editor;

    // Sync editor theme with the site nav theme toggle.
    // site.js does `body.classList.remove(...all); body.classList.add(theme)`
    // which fires the MutationObserver twice — once with no theme class, once
    // with the new theme class. We debounce so we always read the FINAL state.
    let themeSyncTimer = null;
    new MutationObserver(() => {
      clearTimeout(themeSyncTimer);
      themeSyncTimer = setTimeout(() => {
        const cls = document.body.classList;
        if (cls.contains('qd-theme-dark'))       editor.setTheme('dark');
        else if (cls.contains('qd-theme-light')) editor.setTheme('light');
        else if (cls.contains('qd-theme-auto'))  editor.setTheme('auto');
      }, 0);
    }).observe(document.body, { attributes: true, attributeFilter: ['class'] });

    // The edit page is a DEMO of quikdown_edit, not a "save your draft" tool.
    // We deliberately do NOT use localStorage — every visit shows the fresh
    // sample. For sharing, paste your markdown into the URL hash:
    //   /quikdown/edit/#md=<base64-encoded-markdown>
    //
    // Clear any pre-existing localStorage drafts from older versions of this
    // page so users aren't surprised by old content.
    try {
        localStorage.removeItem('quikdown-edit:doc:v1');
        localStorage.removeItem('quikdown-edit:doc:v2');
        localStorage.removeItem('quikdown-edit:doc:v3');
    } catch (_e) {}


    // Load from URL hash if present, otherwise fetch the shared demo content.
    // The sample lives in /quikdown/pages/demo_content.md so it can use real
    // tab characters and backticks without JS template-literal escaping —
    // and so the same content can be reused across multiple demo pages.
    async function loadInitial() {
      const hash = window.location.hash;
      if (hash.startsWith('#md=')) {
        try {
          const md = decodeURIComponent(atob(hash.slice(4)));
          editor.setMarkdown(md);
          return;
        } catch (_e) { /* fall through to default */ }
      }
      try {
        const res = await fetch('{{ROOT}}/pages/demo_content.md');
        if (res.ok) {
          // demo_content.md uses bare filenames (palm.png, sample.webp)
          // relative to pages/. This page is at pages/edit/, so fix paths.
          let md = await res.text();
          md = md.replace(/\(palm\.png\)/g, '(../palm.png)');
          md = md.replace(/"sample\.webp"/g, '"../sample.webp"');
          editor.setMarkdown(md);
          return;
        }
      } catch (_e) { /* fall through */ }
      editor.setMarkdown('# Welcome\n\nFailed to load sample. Start typing.');
    }
    loadInitial();
  </script>
  <script src="{{ROOT}}/pages/scripts/site.js" defer></script>
</body>
</html>
