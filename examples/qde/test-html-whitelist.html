<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>HTML Whitelist E2E Test Page</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }
        #editor { height: 600px; border: 2px solid #007bff; border-radius: 4px; }
    </style>
</head>
<body>
    <h1>HTML Whitelist E2E Test</h1>
    <div id="editor"></div>

    <script type="module">
        import QuikdownEditor from '../../dist/quikdown_edit.esm.min.js';

        window.editor = new QuikdownEditor('#editor', {
            mode: 'split',
            allowUnsafeHTML: 'limited',
            showAllowUnsafeHTML: true,
            plugins: { highlightjs: true }
        });

        window.editor.setMarkdown('# HTML Whitelist Test\n\nReady for tests.');

        // Expose SAFE_HTML_TAGS for test assertions
        window.SAFE_HTML_TAGS = QuikdownEditor.SAFE_HTML_TAGS;
    </script>
</body>
</html>
