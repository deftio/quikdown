<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Parser options — Parser example 2 · quikdown</title>
  <meta name="description" content="Toggle quikdown parser options live: inline_styles, lazy_linefeeds, bidirectional, allow_unsafe_urls. See how each affects the rendered output.">
  <meta name="keywords" content="quikdown options, inline_styles, lazy_linefeeds, bidirectional markdown, markdown parser configuration">
  <meta name="theme-color" content="#9550bb">
  <link rel="canonical" href="https://deftio.github.io/quikdown/examples/parser-options.html">
  <link rel="icon" type="image/svg+xml" href="/quikdown/favicon.svg">

  <meta property="og:type" content="article">
  <meta property="og:title" content="Parser options — Live demo">
  <meta property="og:description" content="Toggle quikdown parser options and see how they affect output, in real time.">

  <link rel="stylesheet" href="/quikdown/site/styles/quikdown-site.css">
  <style>
    .ex-page { max-width: 1100px; margin: 0 auto; padding: 1.5rem; }
    .ex-page-header h1 {
      font-size: 1.8rem;
      margin: 0 0 0.4rem 0;
      background: linear-gradient(135deg, #667eea, #764ba2);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .ex-page-header .crumbs { font-size: 0.85rem; color: #6b7280; margin-bottom: 0.4rem; }
    .ex-page-header .crumbs a { color: #6b7280; }
    .ex-pane {
      background: rgba(255, 255, 255, 0.98);
      border: 1px solid rgba(149, 80, 187, 0.15);
      border-radius: 12px;
      padding: 1.5rem;
      margin-bottom: 1.5rem;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.06);
    }
    .ex-pane h2 {
      margin: 0 0 0.75rem 0;
      font-size: 1.05rem;
    }
    .opts-grid {
      display: grid;
      grid-template-columns: 280px 1fr 1fr;
      gap: 1rem;
      align-items: start;
    }
    @media (max-width: 880px) {
      .opts-grid { grid-template-columns: 1fr; }
    }
    .opts-controls label {
      display: flex;
      align-items: flex-start;
      gap: 0.6rem;
      padding: 0.6rem;
      border-radius: 6px;
      cursor: pointer;
      transition: background 0.18s;
    }
    .opts-controls label:hover { background: #f8f9fb; }
    .opts-controls input[type="checkbox"] { margin-top: 0.25rem; }
    .opts-controls .opt-name { font-family: ui-monospace, "SF Mono", Monaco, "Cascadia Code", "Roboto Mono", Consolas, "Courier New", monospace; font-size: 0.9rem; font-weight: 600; color: #1f2937; }
    .opts-controls .opt-desc { font-size: 0.8rem; color: #4b5563; display: block; }
    .opts-source, .opts-output {
      min-height: 380px;
      max-height: 60vh;
      overflow: auto;
      border: 1px solid #e6e8ee;
      border-radius: 6px;
      padding: 1rem;
      background: #ffffff;
    }
    .opts-source textarea {
      width: 100%;
      min-height: 360px;
      border: none;
      resize: vertical;
      font-family: ui-monospace, "SF Mono", Monaco, "Cascadia Code", "Roboto Mono", Consolas, "Courier New", monospace;
      font-size: 0.85rem;
      background: transparent;
      color: #1f2937;
      outline: none;
    }
    .opts-output { background: white; }
    body.qd-theme-dark .opts-output { background: #181828; }
    .ex-nav {
      display: flex; justify-content: space-between; gap: 1rem;
      margin-top: 1.5rem;
    }
    .ex-nav a {
      display: inline-flex; align-items: center; gap: 0.5rem;
      padding: 0.65rem 1.1rem; border-radius: 8px;
      background: rgba(255, 255, 255, 0.98); border: 1px solid #e6e8ee;
      color: #1f2937; text-decoration: none; font-weight: 600; font-size: 0.92rem;
    }
    .ex-nav a:hover { border-color: #9550bb; color: #9550bb; }
  </style>
</head>
<body class="qd-theme-auto">
  <div id="qd-nav-mount"></div>

  <main>
    <div class="ex-page">
      <header class="ex-page-header">
        <div class="crumbs"><a href="/quikdown/examples/">Examples</a> › Track 1 — Parser › Example 2</div>
        <h1>Parser options</h1>
        <p style="color: #4b5563;">Toggle each option below and watch the output update live. The source markdown is on the left, the rendered HTML on the right.</p>
      </header>

      <div class="ex-pane">
        <div class="opts-grid">
          <div class="opts-controls">
            <h2>Options</h2>
            <label>
              <input type="checkbox" id="opt-inline_styles">
              <span>
                <span class="opt-name">inline_styles</span>
                <span class="opt-desc">Use inline <code>style="..."</code> attributes instead of CSS classes. Useful when you can't include a stylesheet.</span>
              </span>
            </label>
            <label>
              <input type="checkbox" id="opt-lazy_linefeeds">
              <span>
                <span class="opt-name">lazy_linefeeds</span>
                <span class="opt-desc">Single newlines become <code>&lt;br&gt;</code> tags. Useful for chat-style markdown where users hit Enter often.</span>
              </span>
            </label>
            <label>
              <input type="checkbox" id="opt-bidirectional">
              <span>
                <span class="opt-name">bidirectional</span>
                <span class="opt-desc">Add <code>data-qd-*</code> attributes for round-tripping back to markdown via <code>quikdown_bd</code>.</span>
              </span>
            </label>
            <label>
              <input type="checkbox" id="opt-allow_unsafe_urls">
              <span>
                <span class="opt-name">allow_unsafe_urls</span>
                <span class="opt-desc">Disable URL sanitization. <strong>Only enable for trusted input</strong> — opens XSS vectors.</span>
              </span>
            </label>
          </div>
          <div class="opts-source">
            <h2 style="margin-top:0;">Source</h2>
            <textarea id="opt-input"># Heading

A paragraph with **bold**, *italic*, and `inline code`.
A second line right after — try lazy_linefeeds.

- list item one
- list item two

```javascript
function hello() { return 'world'; }
```

[A link](https://example.com)
[Unsafe?](javascript:alert(1))

| Col A | Col B |
|:------|------:|
| 1     | 2     |</textarea>
          </div>
          <div>
            <h2 style="margin-top:0;">Rendered</h2>
            <div class="opts-output" id="opt-output"></div>
          </div>
        </div>
      </div>

      <div class="ex-pane">
        <h2>Generated HTML</h2>
        <pre id="opt-html-source" style="margin:0; font-size:0.78rem; max-height:300px;"></pre>
      </div>

      <nav class="ex-nav">
        <a href="/quikdown/examples/parser-hello.html">← Previous: Hello world</a>
        <a href="/quikdown/examples/">All examples</a>
      </nav>
    </div>
  </main>

  <div id="qd-footer-mount"></div>

  <script type="module">
    import quikdown from '/quikdown/dist/quikdown.esm.js';

    const $ = id => document.getElementById(id);
    const opts = ['inline_styles', 'lazy_linefeeds', 'bidirectional', 'allow_unsafe_urls'];

    function render() {
      const o = {};
      opts.forEach(name => o[name] = $(`opt-${name}`).checked);
      const md = $('opt-input').value;
      const html = quikdown(md, o);
      $('opt-output').innerHTML = html;
      $('opt-html-source').textContent = html;
    }

    opts.forEach(name => $(`opt-${name}`).addEventListener('change', render));
    $('opt-input').addEventListener('input', render);
    render();

  </script>
  <script src="/quikdown/site/scripts/example-page.js" defer></script>
</body>
</html>
