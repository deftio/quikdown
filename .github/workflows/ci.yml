name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 24.x

    - name: Install dependencies
      run: npm ci

    - name: Run tests
      run: npm test

    - name: Build project
      run: npm run build

    - name: Check build output exists
      run: |
        test -f dist/quikdown.umd.js
        test -f dist/quikdown.umd.min.js
        test -f dist/quikdown.esm.js
        test -f dist/quikdown.cjs
        test -f dist/quikdown_bd.umd.js
        test -f dist/quikdown_bd.esm.js
        test -f dist/quikdown_bd.cjs
        test -f dist/quikdown_edit.umd.js
        test -f dist/quikdown_edit.esm.js
        test -f dist/quikdown_edit.cjs
        test -f dist/quikdown_ast.esm.js
        test -f dist/quikdown_json.esm.js
        test -f dist/quikdown_yaml.esm.js
        test -f dist/quikdown_ast_html.esm.js

  # Publish job: runs only on push to main when package.json version is new.
  # Tags, publishes to npm, and creates a GitHub Release in one workflow —
  # avoids the GITHUB_TOKEN limitation where tags don't trigger other workflows.
  publish:
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 24.x

    - name: Read version from package.json
      id: version
      run: echo "version=v$(node -p 'require("./package.json").version')" >> "$GITHUB_OUTPUT"

    - name: Check if tag already exists on origin
      id: tag_exists
      run: |
        TAG="${{ steps.version.outputs.version }}"
        if git ls-remote --tags origin "$TAG" | grep -q .; then
          echo "exists=true" >> "$GITHUB_OUTPUT"
          echo "::notice::Tag $TAG already exists — not a release commit."
        else
          echo "exists=false" >> "$GITHUB_OUTPUT"
          echo "Tag $TAG is new — will publish."
        fi

    - name: Check npm version collision
      if: steps.tag_exists.outputs.exists == 'false'
      run: node tools/checkVersion.cjs

    - name: Install dependencies
      if: steps.tag_exists.outputs.exists == 'false'
      run: npm ci

    - name: Run tests
      if: steps.tag_exists.outputs.exists == 'false'
      run: npm test

    - name: Build project
      if: steps.tag_exists.outputs.exists == 'false'
      run: npm run build

    - name: Create and push tag
      if: steps.tag_exists.outputs.exists == 'false'
      run: |
        git tag "${{ steps.version.outputs.version }}"
        git push origin "${{ steps.version.outputs.version }}"

    - name: Publish to npm (OIDC trusted publisher)
      if: steps.tag_exists.outputs.exists == 'false'
      run: npx -y npm@latest publish --provenance --access public

    - name: Create GitHub Release
      if: steps.tag_exists.outputs.exists == 'false'
      uses: softprops/action-gh-release@v2
      with:
        tag_name: ${{ steps.version.outputs.version }}
        generate_release_notes: true
        files: |
          dist/quikdown.umd.min.js
          dist/quikdown.esm.min.js
          dist/quikdown.cjs
          dist/quikdown_bd.umd.min.js
          dist/quikdown_bd.esm.min.js
          dist/quikdown_edit.umd.min.js
          dist/quikdown.light.min.css
          dist/quikdown.dark.min.css
