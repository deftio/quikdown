name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 24.x

    - name: Install dependencies
      run: npm ci

    - name: Run tests
      run: npm test

    - name: Build project
      run: npm run build

    - name: Check build output exists
      run: |
        test -f dist/quikdown.umd.js
        test -f dist/quikdown.umd.min.js
        test -f dist/quikdown.esm.js
        test -f dist/quikdown.cjs
        test -f dist/quikdown_bd.umd.js
        test -f dist/quikdown_bd.esm.js
        test -f dist/quikdown_bd.cjs
        test -f dist/quikdown_edit.umd.js
        test -f dist/quikdown_edit.esm.js
        test -f dist/quikdown_edit.cjs
        test -f dist/quikdown_ast.esm.js
        test -f dist/quikdown_json.esm.js
        test -f dist/quikdown_yaml.esm.js
        test -f dist/quikdown_ast_html.esm.js

  # Tag + trigger publish: runs only on push to main when the version is new.
  # Creates the git tag, then triggers publish.yml (which npm trusts for OIDC).
  tag-and-publish:
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: write
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 24.x

    - name: Read version from package.json
      id: version
      run: echo "version=v$(node -p 'require("./package.json").version')" >> "$GITHUB_OUTPUT"

    - name: Check if tag already exists on origin
      id: tag_exists
      run: |
        TAG="${{ steps.version.outputs.version }}"
        if git ls-remote --tags origin "$TAG" | grep -q .; then
          echo "exists=true" >> "$GITHUB_OUTPUT"
          echo "::notice::Tag $TAG already exists — not a release commit."
        else
          echo "exists=false" >> "$GITHUB_OUTPUT"
          echo "Tag $TAG is new — will create and publish."
        fi

    - name: Check npm version collision
      if: steps.tag_exists.outputs.exists == 'false'
      run: node tools/checkVersion.cjs

    - name: Create and push tag
      if: steps.tag_exists.outputs.exists == 'false'
      run: |
        git tag "${{ steps.version.outputs.version }}"
        git push origin "${{ steps.version.outputs.version }}"

    - name: Trigger publish workflow
      if: steps.tag_exists.outputs.exists == 'false'
      run: |
        gh workflow run publish.yml -f tag="${{ steps.version.outputs.version }}"
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
