name: Publish to npm

on:
  push:
    tags:
      - 'v*'
  # Allow manual re-run for an existing tag (e.g., if previous publish failed).
  workflow_dispatch:
    inputs:
      tag:
        description: 'Existing tag to publish (e.g. v1.2.2)'
        required: true
        type: string

permissions:
  contents: write
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        ref: ${{ github.event.inputs.tag || github.ref }}

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 22.x
        registry-url: https://registry.npmjs.org

    # npm 11.5.1+ is required for OIDC trusted publishing.
    # Node 22 ships with npm 10.x, so upgrade explicitly.
    - name: Upgrade npm to OIDC-capable version
      run: npm install -g npm@latest

    - name: Install dependencies
      run: npm ci

    - name: Run tests
      run: npm test

    - name: Build project
      run: npm run build

    - name: Publish to npm (OIDC trusted publisher)
      run: npm publish --provenance --access public

  release:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        ref: ${{ github.event.inputs.tag || github.ref }}

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        generate_release_notes: true
        files: |
          dist/quikdown.umd.min.js
          dist/quikdown.esm.min.js
          dist/quikdown.cjs
          dist/quikdown_bd.umd.min.js
          dist/quikdown_bd.esm.min.js
          dist/quikdown_edit.umd.min.js
          dist/quikdown.light.min.css
          dist/quikdown.dark.min.css
