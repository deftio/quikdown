name: Publish to npm

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 20.x
        registry-url: https://registry.npmjs.org

    - name: Install dependencies
      run: npm ci

    - name: Run tests
      run: npm test

    - name: Build project
      run: npm run build

    - name: Publish to npm (OIDC trusted publisher)
      run: npm publish --provenance --access public

  release:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        generate_release_notes: true
        files: |
          dist/quikdown.umd.min.js
          dist/quikdown.esm.min.js
          dist/quikdown.cjs
          dist/quikdown_bd.umd.min.js
          dist/quikdown_bd.esm.min.js
          dist/quikdown_edit.umd.min.js
          dist/quikdown.light.min.css
          dist/quikdown.dark.min.css
